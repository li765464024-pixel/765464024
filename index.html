<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>复盘工具</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== 顶部工具栏 ===== -->
  <header class="toolbar">
    <h1>📋 复盘工具</h1>
    <div class="toolbar-actions">
      <button class="btn btn-outline" id="exportBtn" title="导出 JSON 备份">⬇ 导出</button>
      <button class="btn btn-outline" id="importBtn" title="从 JSON 文件导入">⬆ 导入</button>
      <input type="file" id="importFileInput" accept=".json" hidden>
      <button class="btn btn-danger-outline" id="clearBtn" title="清空所有卡片">🗑 清空</button>
    </div>
  </header>

  <!-- ===== 三栏面板 ===== -->
  <main class="board" id="board">

    <!-- 列：做的好的 -->
    <section class="column" data-column="good">
      <div class="column-header column-header--good">
        <h2>✅ 做的好的</h2>
        <span class="card-count" id="count-good">0</span>
      </div>
      <div class="card-list" id="list-good" data-type="good"></div>
      <button class="btn-add-card" data-type="good">＋ 添加卡片</button>
    </section>

    <!-- 列：待改进 -->
    <section class="column" data-column="improve">
      <div class="column-header column-header--improve">
        <h2>🔧 待改进</h2>
        <span class="card-count" id="count-improve">0</span>
      </div>
      <div class="card-list" id="list-improve" data-type="improve"></div>
      <button class="btn-add-card" data-type="improve">＋ 添加卡片</button>
    </section>

    <!-- 列：行动项 -->
    <section class="column" data-column="action">
      <div class="column-header column-header--action">
        <h2>🎯 行动项</h2>
        <span class="card-count" id="count-action">0</span>
      </div>
      <div class="card-list" id="list-action" data-type="action"></div>
      <button class="btn-add-card" data-type="action">＋ 添加卡片</button>
    </section>

  </main>

  <!-- ===== 添加卡片模态框 ===== -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3>添加复盘卡片</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <label for="cardText">内容</label>
        <textarea id="cardText" rows="3" placeholder="写下你的复盘记录…" maxlength="500"></textarea>
        <label for="cardType">分类</label>
        <select id="cardType">
          <option value="good">✅ 做的好的</option>
          <option value="improve">🔧 待改进</option>
          <option value="action">🎯 行动项</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-cancel" id="modalCancel">取消</button>
        <button class="btn btn-primary" id="modalConfirm">确认添加</button>
      </div>
    </div>
  </div>

  <!-- ===== 编辑卡片模态框 ===== -->
  <div class="modal-overlay" id="editModalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3>编辑卡片</h3>
        <button class="modal-close" id="editModalClose">&times;</button>
      </div>
      <div class="modal-body">
        <label for="editText">内容</label>
        <textarea id="editText" rows="3" placeholder="修改内容…" maxlength="500"></textarea>
        <label for="editType">分类</label>
        <select id="editType">
          <option value="good">✅ 做的好的</option>
          <option value="improve">🔧 待改进</option>
          <option value="action">🎯 行动项</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-cancel" id="editModalCancel">取消</button>
        <button class="btn btn-primary" id="editModalConfirm">保存</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
